<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería Erick</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* HEADER */
header {
  background: black;
  text-align: center;
  padding: 20px;
}

header img {
  border-radius: 50%;
}

/* NAV */
nav {
  background: #222;
  text-align: center;
  padding: 10px;
}

nav a {
  color: gold;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  background: url('https://images.unsplash.com/photo-1621605815971-fbc98d665033') no-repeat center/cover;
  height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero h2 {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
}

/* SECCIONES */
.section {
  padding: 40px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #222;
  padding: 20px;
  width: 220px;
  border-radius: 10px;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* BOTONES */
button {
  background: gold;
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  font-weight: bold;
  border-radius: 5px;
}

/* WHATSAPP */
.whatsapp {
  background: #25D366;
  color: white;
  margin-top: 10px;
}

/* MAPA */
iframe {
  width: 100%;
  height: 300px;
  border: none;
}

/* FOOTER */
footer {
  background: black;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Logo" width="100">
  <h1>💈 Barbería Erick</h1>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#servicios">Servicios</a>
  <a href="#contacto">Contacto</a>
</nav>

<div class="hero">
  <h2>Tu estilo empieza aquí</h2>
</div>

<!-- SERVICIOS -->
<div class="section" id="servicios">
  <h2>Servicios</h2>
  <div class="cards">
    <div class="card">
      <h3>Corte</h3>
      <p>Corte moderno</p>
      <p><strong>S/20</strong></p>
    </div>

    <div class="card">
      <h3>Barba</h3>
      <p>Perfilado profesional</p>
      <p><strong>S/15</strong></p>
    </div>

    <div class="card">
      <h3>Full</h3>
      <p>Corte + barba</p>
      <p><strong>S/30</strong></p>
    </div>
  </div>
</div>

<!-- RESERVA -->
<div class="section">
  <h2>Reserva tu cita</h2>

  <button onclick="alert('Reserva próximamente')">
    Reservar
  </button>

  <br><br>

  <!-- BOTON WHATSAPP -->
  <a href="https://wa.me/51999999999" target="_blank">
    <button class="whatsapp">
      📲 Reservar por WhatsApp
    </button>
  </a>
</div>

<!-- UBICACION -->
<div class="section" id="contacto">
  <h2>Ubicación</h2>

  <iframe src="https://www.google.com/maps?q=Lima,Peru&output=embed"></iframe>
</div>

<footer>
  <p>© 2026 Barbería Erick</p>
</footer>

</body>
</html>
